<div class="container mt-4">

  <!-- Header -->

  <div class="text-center mb-4">

    <h1 class="fw-bold">Hotel Room Booking</h1>

    <p class="text-muted">
      Browse available rooms and book your stay
    </p>

  </div>


  <!-- Success message -->

  <div
    *ngIf="successMessage"
    class="alert alert-success alert-dismissible fade show"
  >

    {{ successMessage }}

    <button
      type="button"
      class="btn-close"
      (click)="successMessage = null"
    ></button>

  </div>


  <h2 class="mb-4">Available Rooms</h2>


  <!-- Filter -->

  <div class="mb-3">

    <label class="form-label">Filter by Room Type</label>

    <select
      class="form-select w-auto"
      [(ngModel)]="selectedType"
    >

      <option value="All">All</option>
      <option value="Single">Single</option>
      <option value="Double">Double</option>
      <option value="Suite">Suite</option>

    </select>

  </div>


  <!-- Loading Spinner -->

  <div
    *ngIf="isLoading"
    class="text-center my-5"
  >

    <div
      class="spinner-border text-primary"
      role="status"
    ></div>

    <p class="mt-3">Loading rooms...</p>

  </div>


  <!-- Room List -->

  <div *ngIf="!isLoading">

    <div class="row">

      <div
        class="col-md-4 mb-3"
        *ngFor="let room of filteredRooms"
      >

        <app-room-card
          [room]="room"
          (book)="openBooking($event)"
        >
        </app-room-card>

      </div>

    </div>

  </div>


  <!-- Booking Modal -->

  <app-book-room-modal
    *ngIf="showModal"
    (closeModal)="closeModal()"
    (confirm)="confirmBooking($event)"
  >
  </app-book-room-modal>

</div>
